<!-- Générateur de mots de passe moderne -->
<div class="password-generator fade-in-up">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <h4 style="margin: 0; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-magic" style="color: var(--primary);"></i>
            Générateur de mots de passe
        </h4>
        <button class="btn" onclick="generatePassword()" style="padding: 8px 16px;">
            <i class="fas fa-sync-alt" style="margin-right: 6px;"></i>
            Générer
        </button>
    </div>

    <!-- Affichage du mot de passe généré -->
    <div class="password-display" id="generatedPassword">
        <span id="passwordText">Cliquez sur "Générer" pour créer un mot de passe</span>
        <button class="copy-btn" onclick="copyPassword()" title="Copier">
            <i class="fas fa-copy"></i>
        </button>
    </div>

    <!-- Indicateur de force -->
    <div class="password-strength">
        <div class="password-strength-bar" id="strengthBar"></div>
    </div>
    <div style="display: flex; justify-content: space-between; margin-top: 8px;">
        <small style="color: var(--muted);">Force du mot de passe</small>
        <small id="strengthText" style="color: var(--muted);">-</small>
    </div>

    <!-- Options de génération -->
    <div style="margin-top: 24px;">
        <h5 style="margin: 0 0 16px 0; font-size: 16px; color: var(--text);">Options</h5>

        <!-- Longueur -->
        <div style="margin-bottom: 16px;">
            <label style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="color: var(--text); font-weight: 500;">
                    <i class="fas fa-ruler" style="margin-right: 8px; color: var(--muted);"></i>
                    Longueur
                </span>
                <span id="lengthValue" style="color: var(--primary); font-weight: 600;">12</span>
            </label>
            <input type="range" id="lengthSlider" min="4" max="50" value="12"
                style="width: 100%; height: 6px; background: var(--glass); border-radius: 3px; outline: none;"
                oninput="updateLength(this.value)">
        </div>

        <!-- Types de caractères -->
        <div style="display: grid; gap: 12px;">
            <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                <span style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-font" style="color: var(--muted);"></i>
                    Lettres majuscules (A-Z)
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeUppercase" checked onchange="updatePassword()">
                    <span class="slider"></span>
                </label>
            </label>

            <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                <span style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-font" style="color: var(--muted);"></i>
                    Lettres minuscules (a-z)
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeLowercase" checked onchange="updatePassword()">
                    <span class="slider"></span>
                </label>
            </label>

            <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                <span style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-hashtag" style="color: var(--muted);"></i>
                    Chiffres (0-9)
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeNumbers" checked onchange="updatePassword()">
                    <span class="slider"></span>
                </label>
            </label>

            <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;">
                <span style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-exclamation" style="color: var(--muted);"></i>
                    Symboles (!@#$%^&*)
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeSymbols" checked onchange="updatePassword()">
                    <span class="slider"></span>
                </label>
            </label>
        </div>

        <!-- Boutons d'action -->
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button class="btn btn-primary" onclick="generatePassword()" style="flex: 1;">
                <i class="fas fa-magic" style="margin-right: 8px;"></i>
                Générer
            </button>
            <button class="btn" onclick="copyPassword()" style="flex: 1;">
                <i class="fas fa-copy" style="margin-right: 8px;"></i>
                Copier
            </button>
        </div>
    </div>
</div>

<script>
    // Configuration du générateur
    const config = {
        length: 12,
        includeUppercase: true,
        includeLowercase: true,
        includeNumbers: true,
        includeSymbols: true
    };

    // Caractères disponibles
    const chars = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    // Mise à jour de la longueur
    function updateLength(value) {
        config.length = parseInt(value);
        document.getElementById('lengthValue').textContent = value;
        updatePassword();
    }

    // Mise à jour des options
    function updatePassword() {
        config.includeUppercase = document.getElementById('includeUppercase').checked;
        config.includeLowercase = document.getElementById('includeLowercase').checked;
        config.includeNumbers = document.getElementById('includeNumbers').checked;
        config.includeSymbols = document.getElementById('includeSymbols').checked;

        generatePassword();
    }

    // Génération du mot de passe
    function generatePassword() {
        let availableChars = '';

        if (config.includeUppercase) availableChars += chars.uppercase;
        if (config.includeLowercase) availableChars += chars.lowercase;
        if (config.includeNumbers) availableChars += chars.numbers;
        if (config.includeSymbols) availableChars += chars.symbols;

        if (availableChars === '') {
            document.getElementById('passwordText').textContent = 'Sélectionnez au moins un type de caractère';
            updateStrength('', 'Aucun');
            return;
        }

        let password = '';
        for (let i = 0; i < config.length; i++) {
            password += availableChars.charAt(Math.floor(Math.random() * availableChars.length));
        }

        document.getElementById('passwordText').textContent = password;
        updateStrength(password);
    }

    // Calcul de la force du mot de passe
    function updateStrength(password, customText = null) {
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        if (customText) {
            strengthBar.className = 'password-strength-bar';
            strengthText.textContent = customText;
            return;
        }

        let score = 0;
        let feedback = '';

        // Longueur
        if (password.length >= 8) score += 1;
        if (password.length >= 12) score += 1;
        if (password.length >= 16) score += 1;

        // Types de caractères
        if (/[a-z]/.test(password)) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^A-Za-z0-9]/.test(password)) score += 1;

        // Mise à jour de l'affichage
        strengthBar.className = 'password-strength-bar';

        if (score <= 2) {
            strengthBar.classList.add('strength-weak');
            feedback = 'Faible';
            strengthText.style.color = 'var(--danger)';
        } else if (score <= 4) {
            strengthBar.classList.add('strength-fair');
            feedback = 'Moyen';
            strengthText.style.color = 'var(--warning)';
        } else if (score <= 6) {
            strengthBar.classList.add('strength-good');
            feedback = 'Bon';
            strengthText.style.color = 'var(--info)';
        } else {
            strengthBar.classList.add('strength-strong');
            feedback = 'Très fort';
            strengthText.style.color = 'var(--success)';
        }

        strengthText.textContent = feedback;
    }

    // Copie du mot de passe
    function copyPassword() {
        const passwordText = document.getElementById('passwordText').textContent;

        if (passwordText === 'Cliquez sur "Générer" pour créer un mot de passe') {
            generatePassword();
            return;
        }

        navigator.clipboard.writeText(passwordText).then(() => {
            // Animation de confirmation
            const copyBtn = document.querySelector('.copy-btn');
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i>';
            copyBtn.style.background = 'var(--success)';

            setTimeout(() => {
                copyBtn.innerHTML = originalIcon;
                copyBtn.style.background = 'var(--primary)';
            }, 2000);
        });
    }

    // Génération automatique au chargement
    document.addEventListener('DOMContentLoaded', function () {
        generatePassword();
    });
</script>
